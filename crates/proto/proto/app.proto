syntax = "proto3";
package zed.messages;

import "buffer.proto";
import "core.proto";

message ShutdownRemoteServer {}

message Toast {
  uint64 project_id = 1;
  string notification_id = 2;
  string message = 3;
}

message HideToast {
  uint64 project_id = 1;
  string notification_id = 2;
}

message OpenServerSettings {
  uint64 project_id = 1;
}

message GetCrashFiles {}

message GetCrashFilesResponse {
  repeated CrashReport crashes = 1;
  reserved 2; // old panics
}

message CrashReport {
  reserved 1, 2;
  string metadata = 3;
  bytes minidump_contents = 4;
}

message Extension {
  string id = 1;
  string version = 2;
  bool dev = 3;
}

message SyncExtensions {
  repeated Extension extensions = 1;
}

message SyncExtensionsResponse {
  string tmp_dir = 1;
  repeated Extension missing_extensions = 2;
}

message InstallExtension {
  Extension extension = 1;
  string tmp_dir = 2;
}

message AskPassRequest {
  uint64 project_id = 1;
  reserved 2;
  uint64 repository_id = 3;
  uint64 askpass_id = 4;
  string prompt = 5;
}

message AskPassResponse {
  string response = 1;
}

enum PanelId {
    AssistantPanel = 0;
    DebugPanel = 1;
}

message ViewId {
  PeerId creator = 1;
  uint64 id = 2;
}

message UpdateActiveView {
  reserved 1, 2;
  View view = 3;
}

message Follow {
  uint64 room_id = 1;
  optional uint64 project_id = 2;
  PeerId leader_id = 3;
}

message FollowResponse {
  View active_view = 3;
  reserved 1;
  repeated View views = 2;
}

message UpdateFollowers {
  uint64 room_id = 1;
  optional uint64 project_id = 2;
  reserved 3;
  oneof variant {
    View create_view = 5;
    UpdateActiveView update_active_view = 4;
    UpdateView update_view = 6;
  }
}

message Unfollow {
  uint64 room_id = 1;
  optional uint64 project_id = 2;
  PeerId leader_id = 3;
}

message UpdateView {
  ViewId id = 1;
  optional PeerId leader_id = 2;

  oneof variant {
    Editor editor = 3;
  }

  message Editor {
    repeated ExcerptInsertion inserted_excerpts = 1;
    repeated uint64 deleted_excerpts = 2;
    repeated Selection selections = 3;
    optional Selection pending_selection = 4;
    EditorAnchor scroll_top_anchor = 5;
    reserved 6;
    reserved 7;
    double scroll_x = 8;
    double scroll_y = 9;
    repeated PathExcerpts updated_paths = 10;
    repeated uint64 deleted_buffers = 11;
  }
}

message View {
  ViewId id = 1;
  optional PeerId leader_id = 2;
  optional PanelId panel_id = 6;

  oneof variant {
    Editor editor = 3;
  }

  reserved 5;

  message Editor {
    bool singleton = 1;
    optional string title = 2;
    repeated Excerpt excerpts = 3;
    repeated Selection selections = 4;
    optional Selection pending_selection = 5;
    EditorAnchor scroll_top_anchor = 6;
    reserved 7;
    reserved 8;
    double scroll_x = 9;
    double scroll_y = 10;
    repeated PathExcerpts path_excerpts = 11;
  }
}

message ExcerptInsertion {
  Excerpt excerpt = 1;
  optional uint64 previous_excerpt_id = 2;
}

message Excerpt {
  uint64 id = 1;
  uint64 buffer_id = 2;
  Anchor context_start = 3;
  Anchor context_end = 4;
  Anchor primary_start = 5;
  Anchor primary_end = 6;
}

message ExcerptRange {
  Anchor context_start = 1;
  Anchor context_end = 2;
  Anchor primary_start = 3;
  Anchor primary_end = 4;
}

message PathExcerpts {
  PathKey path_key = 1;
  uint64 buffer_id = 2;
  repeated ExcerptRange ranges = 3;
}

message GetRemoteProfilingData {
  uint64 project_id = 1;
  bool foreground_only = 2;
}

message GetRemoteProfilingDataResponse {
  repeated RemoteProfilingThread threads = 1;
  uint64 now_nanos = 2;
}

message RemoteProfilingThread {
  optional string thread_name = 1;
  uint64 thread_id = 2;
  repeated RemoteProfilingTiming timings = 3;
}

message RemoteProfilingTiming {
  RemoteProfilingLocation location = 1;
  uint64 start_nanos = 2;
  uint64 duration_nanos = 3;
}

message RemoteProfilingLocation {
  string file = 1;
  uint32 line = 2;
  uint32 column = 3;
}
